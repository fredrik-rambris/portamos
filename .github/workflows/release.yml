name: Release on tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Native binaries (Linux, macOS, Windows) — run in parallel
  # ---------------------------------------------------------------------------
  native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            binary: portamos
          - os: macos-latest
            platform: macos-aarch64
            binary: portamos
          - os: windows-latest
            platform: windows-amd64
            binary: portamos.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build native binary
        run: ./gradlew nativeCompile

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf build/native/nativeCompile/portamos-${{ env.TAG }}-${{ matrix.platform }}.tar.gz \
            -C build/native/nativeCompile ${{ matrix.binary }} \
            -C ${{ github.workspace }} README.md

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          tar -czf build/native/nativeCompile/portamos-${{ env.TAG }}-${{ matrix.platform }}.tar.gz \
            -C build/native/nativeCompile ${{ matrix.binary }} \
            -C ${{ github.workspace }} README.md MacOS-README.txt

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item README.md build/native/nativeCompile/README.md
          Compress-Archive `
            -Path build/native/nativeCompile/${{ matrix.binary }}, build/native/nativeCompile/README.md `
            -DestinationPath build/native/nativeCompile/portamos-${{ env.TAG }}-${{ matrix.platform }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portamos-${{ env.TAG }}-${{ matrix.platform }}
          path: |
            build/native/nativeCompile/portamos-${{ env.TAG }}-${{ matrix.platform }}.tar.gz
            build/native/nativeCompile/portamos-${{ env.TAG }}-${{ matrix.platform }}.zip

  # ---------------------------------------------------------------------------
  # Fat JAR fallback (for users with a JVM)
  # ---------------------------------------------------------------------------
  jar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build runnable JAR
        run: ./gradlew clean shadowJar

      - name: Locate JAR
        id: jar
        run: echo "path=$(find build/libs -maxdepth 1 -name '*-all.jar' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portamos-${{ env.TAG }}-jar
          path: ${{ steps.jar.outputs.path }}

  # ---------------------------------------------------------------------------
  # GitHub Release — waits for all builds, then publishes everything
  # ---------------------------------------------------------------------------
  release:
    needs: [native, jar]
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          subject="$(git log -1 --pretty=%s)"
          body="$(git log -1 --pretty=%b)"
          [ -z "$body" ] && body="$subject"
          printf '%s\n' "$body" > release-notes.txt

          prerelease_flag=""
          if [[ "${{ env.TAG }}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "${{ env.TAG }}" artifacts/* \
            --title "$subject" \
            --notes-file release-notes.txt \
            $prerelease_flag
